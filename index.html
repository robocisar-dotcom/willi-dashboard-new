<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLI</title>

<style>

/* =========================
   🎨 ZÁKLAD
========================= */
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
}

/* pozadie */
body::before{
    content:"";
    position:absolute;
    left:-40%;
    top:-20%;
    width:120%;
    height:120%;
    border-radius:50%;
    background:radial-gradient(circle, #0b2a4a 0%, transparent 70%);
    opacity:0.6;
}

/* =========================
   🧱 LAYOUT
========================= */
.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:70vh;
    padding:0 5vw;
}

/* =========================
   ⏰ HODINY
========================= */
#clock{
    font-size:120px;
}
#date-sk{
    opacity:0.7;
}

/* =========================
   🌦️ POČASIE
========================= */
.weather-icon{
    width:250px;
}
#temp{
    font-size:50px;
}

/* =========================
   📋 EVENT
========================= */
.event{
    text-align:center;
}

/* =========================
   📱 MENU
========================= */
.cards{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#111;
    padding:15px;
}

/* =========================
   🌿 FLÓRA
========================= */
#floraGrid{
    display:flex;
    gap:20px;
    padding:20px;
}

.plant-card{
    background:#111;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 15px green;
}

.progress{
    height:6px;
    background:#333;
}

.bar{
    height:100%;
    background:lime;
}

</style>
</head>

<body>

<!-- DOMOV -->
<div class="main">
    <div>
        <div id="clock"></div>
        <div id="date-sk"></div>
    </div>

    <div>
        <img id="icon" class="weather-icon">
        <div id="temp"></div>
        <div id="desc"></div>
    </div>
</div>

<div class="event" id="event">Načítavam...</div>

<!-- FLÓRA -->
<section id="flora" style="display:none;">
    <div style="padding:20px;">
        <button onclick="addPlant()">+ Pridať rastlinu</button>
    </div>
    <div id="floraGrid"></div>
</section>

<!-- MENU -->
<div class="cards">
    <div onclick="showHome()">🏠<br>DOMOV</div>
    <div onclick="showFlora()">🌿<br>FLÓRA</div>
</div>

<script>

/* ⏰ HODINY */
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.getHours().toString().padStart(2,'0') + ":" +
        now.getMinutes().toString().padStart(2,'0');

    document.getElementById("date-sk").innerHTML =
        now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(updateClock,1000);
updateClock();

/* 🔁 NAVIGÁCIA */
function showFlora(){
    document.querySelector(".main").style.display="none";
    document.getElementById("event").style.display="none";
    document.getElementById("flora").style.display="block";
    renderPlants();
}

function showHome(){
    document.querySelector(".main").style.display="flex";
    document.getElementById("event").style.display="block";
    document.getElementById("flora").style.display="none";
}

/* 🌿 DATA */
const plantLibrary = {
  mint:{interval:3}
};

let plants = [
  {
    id:1,
    type:"mint",
    name:"Mäta",
    location:"Balkón",
    lastWatered:Date.now()-2*86400000
  }
];

/* 🌿 RENDER */
function renderPlants(){
    const grid = document.getElementById("floraGrid");
    grid.innerHTML="";

    plants.forEach(p=>{
        let days = (Date.now()-p.lastWatered)/86400000;
        let progress = days / plantLibrary[p.type].interval;

        let div=document.createElement("div");
        div.className="plant-card";

        div.innerHTML=`
            <h3>${p.name}</h3>
            <p>${p.location}</p>
            <div class="progress">
                <div class="bar" style="width:${progress*100}%"></div>
            </div>
        `;

        grid.appendChild(div);
    });
}

/* 🌿 ADD */
function addPlant(){
    let name = prompt("Názov?");
    if(!name) return;

    plants.push({
        id: Date.now(),
        type:"mint",
        name:name,
        location:"Dom",
        lastWatered:Date.now()
    });

    renderPlants();
}

</script>

</body>
</html>
