<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WILLI SMART HUB</title>

<style>
:root {
    --bg-color: #000;
    --accent-blue: #0b2a4a;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #fff;
}

body {
    margin: 0; background: var(--bg-color); color: var(--text-main);
    font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh;
    overflow-x: hidden;
}

/* ŽIARA NA POZADÍ */
body::before {
    content: ""; position: fixed; left: -20%; top: -10%; width: 140%; height: 140%;
    background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
    opacity: 0.5; z-index: -1;
}

/* --- OBRAZOVKA DOMOV --- */
.main-screen {
    display: flex; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box;
}

.home-top {
    display: flex; justify-content: space-between; align-items: center; flex-grow: 1; padding: 0 5vw;
}

#clock { font-size: clamp(5rem, 15vw, 10rem); font-weight: 800; line-height: 1; }
#date-sk { font-size: clamp(1.2rem, 3vw, 2rem); opacity: 0.7; margin-top: 10px; }

.weather-container { text-align: center; }
.weather-icon { width: clamp(150px, 20vw, 250px); }
#temp { font-size: clamp(4rem, 10vw, 7rem); font-weight: bold; }

#event-box { text-align: center; padding: 40px 20px; font-size: 1.5rem; min-height: 100px; }

/* --- OBRAZOVKA FLÓRA --- */
#flora-screen { display: none; padding-bottom: 150px; }

.flora-top-bar {
    display: flex; justify-content: center; gap: 15px; padding: 20px;
}

.top-pill {
    background: var(--glass); border: 1px solid var(--glass-border);
    padding: 8px 18px; border-radius: 20px; backdrop-filter: blur(10px); font-size: 0.9rem;
}

.flora-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto;
}

/* KARTA RASTLINY */
.plant-card {
    background: var(--glass); border-radius: 24px; padding: 20px;
    border: 1px solid var(--glass-border); cursor: pointer;
    transition: transform 0.2s; backdrop-filter: blur(5px);
}
.plant-card:active { transform: scale(0.95); }
.plant-card img { width: 100%; height: 130px; object-fit: contain; margin-bottom: 10px; }
.plant-card h3 { margin: 5px 0; font-size: 1.1rem; }
.plant-card p { margin: 0; font-size: 0.8rem; opacity: 0.5; }

.status-row { display: flex; justify-content: space-between; font-size: 0.75rem; margin-top: 12px; }
.prog-bg { height: 4px; background: #222; border-radius: 2px; margin-top: 6px; }
.prog-fill { height: 100%; border-radius: 2px; }

/* FIXNÉ TLAČIDLO PRIDAŤ */
.add-btn-wrap {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 100;
}
.btn-add {
    background: var(--glass); border: 1px solid var(--glass-border); color: white;
    padding: 12px 30px; border-radius: 30px; backdrop-filter: blur(15px); cursor: pointer;
}

/* --- DETAIL RASTLINY (OVERLAY) --- */
.detail-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); z-index: 2000; display: none; padding: 20px; box-sizing: border-box;
}
.detail-content { max-width: 900px; margin: 0 auto; position: relative; }
.close-det { position: absolute; top: 0; right: 0; font-size: 2rem; cursor: pointer; border:none; background:none; color:white;}

.detail-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px; }
@media (max-width: 700px) { .detail-layout { grid-template-columns: 1fr; } }

.main-img-det { width: 100%; max-height: 350px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(76, 175, 80, 0.4)); }

/* --- MENU BAR --- */
.nav-bar {
    position: fixed; bottom: 0; width: 100%; display: flex; justify-content: center;
    background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px);
    padding: 15px 0; gap: 80px; border-top: 1px solid var(--glass-border);
}
.nav-icon { font-size: 30px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
.nav-icon.active { opacity: 1; transform: translateY(-5px); }
</style>
</head>

<body>

<!-- OBRAZOVKA: DOMOV -->
<div id="home-screen" class="main-screen">
    <div class="home-top">
        <div>
            <div id="clock">00:00</div>
            <div id="date-sk">...</div>
        </div>
        <div class="weather-container">
            <img id="icon" src="icons/sun.png" class="weather-icon">
            <div id="temp">--°</div>
        </div>
    </div>
    <div id="event-box">Načítavam oznamy...</div>
</div>

<!-- OBRAZOVKA: FLÓRA -->
<div id="flora-screen">
    <div class="flora-top-bar">
        <div class="top-pill" id="flora-date">...</div>
        <div class="top-pill" id="flora-temp-small">...</div>
    </div>

    <div id="floraGrid" class="flora-grid"></div>

    <div class="add-btn-wrap">
        <button class="btn-add" onclick="addNewPlant()">+ Pridať rastlinu</button>
    </div>
</div>

<!-- DETAIL RASTLINY -->
<div id="plantDetail" class="detail-overlay">
    <div class="detail-content">
        <button class="close-det" onclick="closeDetail()">✕</button>
        <div class="detail-layout">
            <div>
                <h1 id="detName">Rastlina</h1>
                <p id="detRoom" style="opacity:0.5;">Umiestnenie: Obývačka</p>
                <img id="detImg" src="" class="main-img-det">
                <div class="top-pill" style="margin-top:20px; display:inline-block;">Stav: <span style="color:#4caf50">Dobrý</span></div>
            </div>
            <div>
                <div style="background:var(--glass); padding:20px; border-radius:20px; border:1px solid var(--glass-border);">
                    <h3>Informácie</h3>
                    <p>☀️ Svetlo: Nepriame</p>
                    <p>🌡️ Teplota: 18-28°C</p>
                    <p>💧 Polievanie: Každých 7 dní</p>
                </div>
                <div style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-add" onclick="alert('Polievanie zaznamenané!')">💧 Poliať</button>
                    <button class="btn-add" style="color:#ff5252" onclick="deleteCurrentPlant()">🗑️ Odstrániť</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- SPODNÁ NAVIGÁCIA -->
<div class="nav-bar">
    <div id="nav-home" class="nav-icon active" onclick="showScreen('home')">🏠</div>
    <div id="nav-flora" class="nav-icon" onclick="showScreen('flora')">🌿</div>
</div>

<script>
/* 🔑 KONFIGURÁCIA */
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

/* 🕒 ČAS A POČASIE */
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerHTML = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    document.getElementById("date-sk").innerHTML = now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
    document.getElementById("flora-date").innerHTML = now.toLocaleDateString('en-US',{month:'long', day:'numeric', year:'numeric'}) + " " + now.getHours() + "h" + now.getMinutes();
}

async function loadWeather(){
    try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current=temperature_2m,weather_code");
        const data = await res.json();
        const t = Math.round(data.current.temperature_2m) + "°";
        document.getElementById("temp").innerHTML = t;
        document.getElementById("flora-temp-small").innerHTML = "☀️ Sunny, " + t;
    } catch (e) {}
}

/* 📅 OZNAMY (SHEETS) */
async function loadEvents(){
    try {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        const txt = await res.text();
        const json = JSON.parse(txt.substring(47).slice(0,-2));
        const now = new Date();
        let html = "";
        json.table.rows.forEach(r => {
            if(!r.c || !r.c[3]) return;
            let dateVal = r.c[1]?.f || "";
            let note = r.c[3]?.v || "";
            if(dateVal.includes(`${now.getDate()}.${now.getMonth()+1}.`)) {
                html += `<div style="margin-bottom:10px">✨ ${note}</div>`;
            }
        });
        document.getElementById("event-box").innerHTML = html || "<span style='opacity:0.3'>Dnes žiadne udalosti</span>";
    } catch (e) { document.getElementById("event-box").innerText = "Chyba načítania"; }
}

/* 🌿 LOGIKA FLÓRA */
let plants = JSON.parse(localStorage.getItem('myPlants')) || [
    { name: "Zamiokulkas", room: "Obývačka 1", img: "https://images.unsplash.com/photo-1614594975525-e45190c55d0b?w=400" },
    { name: "Monstera", room: "Kuchyňa", img: "https://images.unsplash.com/photo-1614594975525-e45190c55d0b?w=400" }
];
let currentDetailIndex = null;

function renderPlants() {
    const grid = document.getElementById("floraGrid");
    grid.innerHTML = "";
    plants.forEach((p, i) => {
        const lvl = Math.floor(Math.random() * 80) + 20;
        grid.innerHTML += `
            <div class="plant-card" onclick="openDetail(${i})">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p>${p.room || 'Miestnosť'}</p>
                <div class="status-row"><span>Stav: <strong style="color:#4caf50">Dobrý</strong></span></div>
                <div class="prog-bg"><div class="prog-fill" style="width:${lvl}%; background:#4caf50"></div></div>
            </div>`;
    });
    localStorage.setItem('myPlants', JSON.stringify(plants));
}

function openDetail(i) {
    currentDetailIndex = i;
    const p = plants[i];
    document.getElementById("detName").innerText = p.name;
    document.getElementById("detRoom").innerText = p.room || "Domov";
    document.getElementById("detImg").src = p.img;
    document.getElementById("plantDetail").style.display = "block";
}

function closeDetail() { document.getElementById("plantDetail").style.display = "none"; }

function deleteCurrentPlant() {
    if(confirm("Odstrániť túto rastlinu?")) {
        plants.splice(currentDetailIndex, 1);
        closeDetail();
        renderPlants();
    }
}

function addNewPlant() {
    const name = prompt("Názov rastliny:");
    const room = prompt("Miestnosť:");
    const img = prompt("URL obrázka (nechaj prázdne):") || "https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=400";
    if(name) {
        plants.push({name, room, img});
        renderPlants();
    }
}

/* 🔄 NAVIGÁCIA */
function showScreen(screen) {
    document.getElementById("home-screen").style.display = (screen === 'home') ? 'flex' : 'none';
    document.getElementById("flora-screen").style.display = (screen === 'flora') ? 'block' : 'none';
    document.getElementById("nav-home").classList.toggle('active', screen === 'home');
    document.getElementById("nav-flora").classList.toggle('active', screen === 'flora');
    if(screen === 'flora') renderPlants();
}

/* 🚀 ŠTART */
updateClock(); loadWeather(); loadEvents();
setInterval(updateClock, 1000);
setInterval(loadWeather, 600000);
</script>
</body>
</html>
