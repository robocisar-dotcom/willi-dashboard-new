<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WILLI Smart Dashboard</title>

<style>
/* ZÁKLADNÉ NASTAVENIA */
:root {
    --bg-color: #000;
    --accent-blue: #0b2a4a;
    --text-main: #fff;
    --text-dim: rgba(255, 255, 255, 0.7);
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
}

body {
    margin: 0;
    padding: 0;
    background: var(--bg-color);
    color: var(--text-main);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* EFEKT ŽIARY NA POZADÍ */
body::before {
    content: "";
    position: fixed;
    left: -20%;
    top: -10%;
    width: 140%;
    height: 140%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
    opacity: 0.5;
    z-index: -1;
}

/* HLAVNÝ KONTAJNER (HODINY + POČASIE) */
.main {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    align-items: center;
    padding: 5vh 5vw;
    gap: 20px;
    flex-grow: 1;
}

/* HODINY */
.clock-section {
    text-align: center;
    flex: 1;
    min-width: 300px;
}

#clock {
    font-size: clamp(5rem, 15vw, 10rem);
    font-weight: 800;
    line-height: 1;
    margin: 0;
}

#date-sk {
    font-size: clamp(1.2rem, 3vw, 2rem);
    opacity: 0.8;
    text-transform: capitalize;
    margin-top: 10px;
}

/* POČASIE */
.weather-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    flex: 1;
    min-width: 250px;
}

.weather-icon {
    width: clamp(150px, 20vw, 250px);
    height: auto;
}

#temp {
    font-size: clamp(4rem, 10vw, 7rem);
    font-weight: bold;
    margin-top: -10px;
}

/* SEKCIÁ OZNAMOV */
.event-section {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
    min-height: 150px;
}

#event {
    font-size: clamp(1.3rem, 4vw, 2.2rem);
    line-height: 1.4;
}

/* MENU / KARTY DOLU */
.cards {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    background: rgba(17, 17, 17, 0.9);
    backdrop-filter: blur(20px);
    padding: 15px 0;
    gap: 80px;
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 1000;
}

.nav-item {
    font-size: 35px;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
    opacity: 0.5;
}

.nav-item.active {
    opacity: 1;
    transform: translateY(-5px);
}

/* --- SEKCIÁ FLÓRA --- */
#flora {
    display: none;
    padding: 20px;
    padding-bottom: 160px;
    min-height: 100vh;
}

.flora-top-info {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 30px;
    margin-top: 10px;
}

.pill {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.9rem;
    backdrop-filter: blur(10px);
}

.flora-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
    max-width: 1200px;
    margin: 0 auto;
}

/* KARTA RASTLINY (Podľa predlohy) */
.plant-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 15px;
    position: relative;
    backdrop-filter: blur(15px);
}

.plant-card img {
    width: 100%;
    height: 130px;
    object-fit: contain;
    margin-bottom: 10px;
}

.plant-card h3 {
    margin: 0;
    font-size: 1rem;
    font-weight: 600;
}

.plant-card p {
    margin: 2px 0;
    font-size: 0.75rem;
    opacity: 0.5;
}

.plant-status {
    font-size: 0.7rem;
    margin-top: 10px;
    font-weight: bold;
    color: #4caf50;
}

.progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: 5px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: #4caf50;
    width: 80%;
}

/* TLAČIDLÁ OVLÁDANIA FLÓRY */
.flora-actions {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    z-index: 1001;
}

.btn-flora {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    backdrop-filter: blur(15px);
    cursor: pointer;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
}

@media (max-width: 600px) {
    .main { flex-direction: column; padding-top: 10vh; }
    #clock { font-size: 6rem; }
    .weather-icon { width: 180px; }
    .cards { gap: 40px; }
}
</style>
</head>

<body>

<div id="home-content">
    <div class="main">
        <div class="clock-section">
            <div id="clock">00:00</div>
            <div id="date-sk">...</div>
        </div>

        <div class="weather-container">
            <img id="icon" src="https://openweathermap.org/img/wn/01d@4x.png" class="weather-icon" alt="weather">
            <div id="temp">--°</div>
        </div>
    </div>

    <div class="event-section">
        <div id="event">Načítavam udalosti...</div>
    </div>
</div>

<!-- FLÓRA SEKCIÁ -->
<section id="flora">
    <div class="flora-top-info">
        <div class="pill" id="flora-date">Dnes</div>
        <div class="pill" id="flora-temp-small">--°C</div>
    </div>

    <div id="floraGrid" class="flora-grid">
        <!-- Zoznam prázdny podľa tvojej požiadavky -->
    </div>

    <!-- Skrytý input pre kameru -->
    <input type="file" accept="image/*" capture="camera" id="cameraInput" style="display:none;" onchange="handleCamera(event)">

    <div class="flora-actions">
        <button class="btn-flora" onclick="addNewPlant()">+ Pridať</button>
        <button class="btn-flora" onclick="document.getElementById('cameraInput').click()">📸 Rozpoznať</button>
    </div>
</section>

<!-- SPODNÁ NAVIGÁCIA -->
<div class="cards">
    <div id="nav-home" class="nav-item active" onclick="showHome()">🏠</div>
    <div id="nav-flora" class="nav-item" onclick="showFlora()">🌿</div>
</div>

<script>
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';
let plants = JSON.parse(localStorage.getItem('myPlants')) || [];

// ⏰ HODINY
function updateClock(){
    const now = new Date();
    const clockEl = document.getElementById("clock");
    const dateEl = document.getElementById("date-sk");
    if(clockEl) clockEl.innerHTML = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    if(dateEl) dateEl.innerHTML = now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
    
    document.getElementById("flora-date").innerHTML = now.toLocaleDateString('en-US',{month:'long', day:'numeric'}) + " " + now.getHours() + ":" + now.getMinutes().toString().padStart(2,'0');
}

// 🌦️ POČASIE
async function loadWeather(){
    try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current=temperature_2m,weather_code");
        const data = await res.json();
        const t = Math.round(data.current.temperature_2m) + "°";
        
        document.getElementById("temp").innerHTML = t;
        document.getElementById("flora-temp-small").innerHTML = "Sunny, " + t;
        
        const code = data.current.weather_code;
        const icon = document.getElementById("icon");
        let iconUrl = "01d";
        if (code > 0 && code <= 3) iconUrl = "02d";
        else if (code > 3) iconUrl = "10d";
        
        icon.src = `https://openweathermap.org/img/wn/${iconUrl}@4x.png`;
    } catch (e) { console.error("Počasie nevyšlo."); }
}

// 📋 OZNAMY
async function loadEvents(){
    try {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        const txt = await res.text();
        const json = JSON.parse(txt.substring(47).slice(0,-2));
        const now = new Date();
        let html = "";
        let found = 0;

        json.table.rows.forEach(r => {
            if(!r.c) return;
            let dateVal = r.c[1]?.f || r.c[1]?.v || "";
            let note = r.c[3]?.v || "";
            if (!note) return;
            let isToday = dateVal.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`);
            if(isToday) {
                found++;
                html += `<div style="margin-bottom: 15px;"><span style="color: #ffeb3b;">✨</span> ${note}</div>`;
            }
        });
        document.getElementById("event").innerHTML = found ? html : "<span style='opacity:0.5;'>✨ Žiadne udalosti dnes</span>";
    } catch (e) { document.getElementById("event").innerHTML = "❌ Chyba načítania"; }
}

// 🌿 FLÓRA LOGIKA
function renderPlants() {
    const grid = document.getElementById("floraGrid");
    grid.innerHTML = "";
    plants.forEach((p, index) => {
        grid.innerHTML += `
            <div class="plant-card">
                <img src="${p.img || 'https://cdn-icons-png.flaticon.com/512/628/628283.png'}" alt="plant">
                <h3>${p.name}</h3>
                <p>${p.room}</p>
                <div class="plant-status">Stav: Dobrý</div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>`;
    });
}

function addNewPlant() {
    const name = prompt("Názov rastliny:");
    const room = prompt("Miestnosť:");
    if(name) {
        plants.push({ name, room, img: "" });
        localStorage.setItem('myPlants', JSON.stringify(plants));
        renderPlants();
    }
}

function handleCamera(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        plants.push({ name: "Nová rastlina", room: "Skenované", img: e.target.result });
        localStorage.setItem('myPlants', JSON.stringify(plants));
        renderPlants();
        window.open('https://www.google.com/search?q=identifikacia+rastliny+podla+fotky', '_blank');
    };
    reader.readAsDataURL(file);
}

// 🔁 NAVIGÁCIA
function showFlora(){
    document.getElementById("home-content").style.display = "none";
    document.getElementById("flora").style.display = "block";
    document.getElementById("nav-home").classList.remove("active");
    document.getElementById("nav-flora").classList.add("active");
    renderPlants();
}

function showHome(){
    document.getElementById("home-content").style.display = "block";
    document.getElementById("flora").style.display = "none";
    document.getElementById("nav-flora").classList.remove("active");
    document.getElementById("nav-home").classList.add("active");
}

// SPUSTENIE
updateClock();
loadWeather();
loadEvents();
setInterval(updateClock, 1000);
setInterval(loadWeather, 600000);
setInterval(loadEvents, 60000);
</script>

</body>
</html>
