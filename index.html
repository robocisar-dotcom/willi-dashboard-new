<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WILLI Smart Dashboard</title>

<style>
/* ZÁKLADNÉ NASTAVENIA */
:root {
    --bg-color: #000;
    --accent-blue: #0b2a4a; /* Tvoja pôvodná modrá žiara */
    --text-main: #fff;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
}

body {
    margin: 0;
    padding: 0;
    background: var(--bg-color);
    color: var(--text-main);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* EFEKT ŽIARY NA POZADÍ - Zachováva tvoj modrý vizuál */
body::before {
    content: "";
    position: fixed;
    left: -20%;
    top: -10%;
    width: 140%;
    height: 140%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
    opacity: 0.5;
    z-index: -1;
}

/* HLAVNÁ OBRAZOVKA (DOMOV) */
#home-content {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.main {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    align-items: center;
    padding: 5vh 5vw;
    gap: 20px;
    flex-grow: 1;
}

#clock {
    font-size: clamp(5rem, 15vw, 10rem);
    font-weight: 800;
    line-height: 1;
    margin: 0;
}

.weather-icon {
    width: clamp(150px, 20vw, 250px);
    height: auto;
}

#temp {
    font-size: clamp(4rem, 10vw, 7rem);
    font-weight: bold;
}

/* SEKCIÁ FLÓRA (Dashboard podľa obrázka) */
#flora {
    display: none;
    padding: 20px;
    padding-bottom: 150px;
    min-height: 100vh;
}

.flora-top-bar {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 20px 0;
}

.top-pill {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 8px 15px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    font-size: 0.9rem;
    color: rgba(255,255,255,0.8);
}

.flora-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
    max-width: 1200px;
    margin: 0 auto;
}

/* KARTA RASTLINY - Štýl z obrázka file_00000000749c71f491f0efaff816c0e2[1].jpg */
.plant-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 16px;
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease;
}

.plant-card:active {
    transform: scale(0.95);
}

.plant-card img {
    width: 100%;
    height: 130px;
    object-fit: contain;
    margin-bottom: 10px;
}

.plant-card h3 {
    margin: 5px 0;
    font-size: 1.1rem;
    font-weight: 600;
}

.plant-card p {
    margin: 0;
    font-size: 0.8rem;
    opacity: 0.5;
}

.status-label {
    font-size: 0.75rem;
    margin-top: 12px;
    color: #4caf50; /* Zelený stav "Dobrý" */
}

/* PROGRESS BAR STAVU */
.prog-bg {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: 6px;
}

.prog-fill {
    height: 100%;
    background: #4caf50;
    border-radius: 2px;
}

/* SPODNÉ OVLÁDANIE (Tlačidlá + Navigácia) */
.bottom-controls {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 1000;
}

.btn-action {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    backdrop-filter: blur(15px);
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
}

.nav-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    background: rgba(10, 10, 10, 0.8);
    backdrop-filter: blur(20px);
    padding: 15px 0;
    gap: 80px;
    border-top: 1px solid var(--glass-border);
    z-index: 500;
}

.nav-icon {
    font-size: 30px;
    cursor: pointer;
    opacity: 0.4;
    transition: 0.3s;
}

.nav-icon.active {
    opacity: 1;
    transform: translateY(-3px);
}
</style>
</head>

<body>

<div id="home-content">
    <div class="main">
        <!-- HODINY -->
        <div class="clock-section">
            <div id="clock">00:00</div>
            <div id="date-sk">...</div>
        </div>

        <!-- POČASIE -->
        <div class="weather-container">
            <img id="icon" src="icons/sun.png" class="weather-icon" alt="weather">
            <div id="temp">--°</div>
            <div id="desc"></div>
        </div>
    </div>

    <!-- OZNAMY -->
    <div class="event-section">
        <div id="event">Načítavam udalosti...</div>
    </div>
</div>

<!-- FLÓRA SEKCIÁ (skrytá) -->
<section id="flora" style="display:none;">
    <h2>🌿 Moja Flóra</h2>
    <button onclick="alert('Pridávanie čoskoro!')" style="padding:10px 20px; cursor:pointer;">+ Pridať rastlinu</button>
    <div id="floraGrid" class="flora-grid">
        <!-- Sem pôjdu karty rastlín -->
    </div>
</section>

<!-- SPODNÁ NAVIGÁCIA -->
<div class="cards">
    <div class="nav-item" onclick="showHome()">🏠</div>
    <div class="nav-item" onclick="showFlora()">🌿</div>
</div>

<script>
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

// ⏰ HODINY A DÁTUM
function updateClock(){
    const now = new Date();
    const clockEl = document.getElementById("clock");
    const dateEl = document.getElementById("date-sk");

    if(clockEl) clockEl.innerHTML = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    if(dateEl) dateEl.innerHTML = now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}

// 🌦️ POČASIE
async function loadWeather(){
    try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current=temperature_2m,weather_code");
        const data = await res.json();
        
        document.getElementById("temp").innerHTML = Math.round(data.current.temperature_2m) + "°";
        
        const code = data.current.weather_code;
        const icon = document.getElementById("icon");
        const hour = new Date().getHours();
        const isNight = (hour >= 20 || hour < 6);

        // Jednoduchá logika ikon
        let type = "sun.png";
        if (code > 0 && code <= 3) type = isNight ? "clear-night.png" : "cloud.png";
        else if (code > 3) type = "rain.png"; 
        
        icon.src = "icons/" + type;
    } catch (e) {
        console.error("Počasie nevyšlo.");
    }
}

// 📋 GOOGLE SHEETS OZNAMY
async function loadEvents(){
    try {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        const txt = await res.text();
        const json = JSON.parse(txt.substring(47).slice(0,-2));
        
        const now = new Date();
        let html = "";
        let found = 0;

        json.table.rows.forEach(r => {
            if(!r.c) return;
            let dateVal = r.c[1]?.f || r.c[1]?.v || "";
            let auto = r.c[2]?.v || "";
            let note = r.c[3]?.v || "";

            if (!note || note.toString().trim() === "") return;

            let isToday = dateVal.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`) || 
                          dateVal.includes(`Date(${now.getFullYear()},${now.getMonth()},${now.getDate()}`);

            if(isToday) {
                found++;
                let subText = auto ? `<br><small style="opacity:0.6; font-size: 0.6em;">(${auto})</small>` : "";
                html += `<div style="margin-bottom: 20px;"><span style="color: #ffeb3b;">✨</span> ${note}${subText}</div>`;
            }
        });

        document.getElementById("event").innerHTML = found ? html : "<span style='opacity:0.5;'>✨ Žiadne udalosti dnes</span>";
    } catch (e) {
        document.getElementById("event").innerHTML = "❌ Chyba načítania";
    }
}

// 🔁 NAVIGÁCIA
function showFlora(){
    document.getElementById("home-content").style.display = "none";
    document.getElementById("flora").style.display = "block";
}

function showHome(){
    document.getElementById("home-content").style.display = "block";
    document.getElementById("flora").style.display = "none";
}

// SPUSTENIE
updateClock();
loadWeather();
loadEvents();
setInterval(updateClock, 1000);
setInterval(loadWeather, 600000);
setInterval(loadEvents, 60000);
</script>

</body>
</html>
