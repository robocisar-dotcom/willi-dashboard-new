<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WILLI Smart Dashboard</title>

<style>
/* ZÁKLADNÉ NASTAVENIA - TVOJE PÔVODNÉ */
:root {
    --bg-color: #000;
    --accent-blue: #0b2a4a;
    --text-main: #fff;
    --text-dim: rgba(255, 255, 255, 0.7);
}

body {
    margin: 0;
    padding: 0;
    background: var(--bg-color);
    color: var(--text-main);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    left: -20%;
    top: -10%;
    width: 140%;
    height: 140%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
    opacity: 0.5;
    z-index: -1;
}

.main {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    align-items: center;
    padding: 5vh 5vw;
    gap: 20px;
    flex-grow: 1;
}

.clock-section {
    text-align: center;
    flex: 1;
    min-width: 300px;
}

#clock {
    font-size: clamp(5rem, 15vw, 10rem);
    font-weight: 800;
    line-height: 1;
    margin: 0;
}

#date-sk {
    font-size: clamp(1.2rem, 3vw, 2rem);
    opacity: 0.8;
    text-transform: capitalize;
    margin-top: 10px;
}

.weather-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    flex: 1;
    min-width: 250px;
}

.weather-icon {
    width: clamp(150px, 20vw, 250px);
    height: auto;
}

#temp {
    font-size: clamp(4rem, 10vw, 7rem);
    font-weight: bold;
    margin-top: -10px;
}

.event-section {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
    min-height: 150px;
}

#event {
    font-size: clamp(1.3rem, 4vw, 2.2rem);
    line-height: 1.4;
}

/* SPODNÁ LIŠTA - FIXNUTÁ DOLE */
.cards {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    background: rgba(17, 17, 17, 0.9);
    backdrop-filter: blur(10px);
    padding: 15px 0;
    gap: 80px;
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 100;
}

.nav-item {
    font-size: 35px;
    cursor: pointer;
    transition: transform 0.2s;
}

.nav-item:active {
    transform: scale(0.8);
}

/* FLÓRA GRID - ABY VYZERALA DOBRE */
#flora {
    padding: 20px;
    padding-bottom: 100px;
    text-align: center;
}

.flora-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.plant-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 15px;
    backdrop-filter: blur(10px);
}

.plant-card img { width: 100%; height: 120px; object-fit: contain; border-radius: 10px; }

@media (max-width: 600px) {
    .main { flex-direction: column; padding-top: 10vh; }
    #clock { font-size: 6rem; }
    .weather-icon { width: 180px; }
    .cards { gap: 40px; }
}
</style>
</head>

<body>

<div id="home-content">
    <div class="main">
        <div class="clock-section">
            <div id="clock">00:00</div>
            <div id="date-sk">...</div>
        </div>

        <div class="weather-container">
            <img id="icon" src="icons/sun.png" class="weather-icon" alt="weather">
            <div id="temp">--°</div>
        </div>
    </div>

    <div class="event-section">
        <div id="event">Načítavam udalosti...</div>
    </div>
</div>

<!-- FLÓRA SEKCIÁ - SKRYTÁ PRI ŠTARTE -->
<section id="flora" style="display:none;">
    <h2>🌿 Moja Flóra</h2>
    <input type="file" accept="image/*" capture="camera" id="cameraInput" style="display:none;" onchange="handleCamera(event)">
    
    <div style="margin-bottom: 20px;">
        <button onclick="addNewPlant()" style="padding:10px 20px; border-radius: 20px; background: #0b2a4a; color: white; border: none;">+ Pridať</button>
        <button onclick="document.getElementById('cameraInput').click()" style="padding:10px 20px; border-radius: 20px; background: #222; color: white; border: none; margin-left: 10px;">📸 Foťák</button>
    </div>

    <div id="floraGrid" class="flora-grid"></div>
</section>

<!-- SPODNÁ NAVIGÁCIA (VŽDY VIDITEĽNÁ) -->
<div class="cards">
    <div class="nav-item" onclick="showHome()">🏠</div>
    <div class="nav-item" onclick="showFlora()">🌿</div>
</div>

<script>
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

// ⏰ HODINY
function updateClock(){
    const now = new Date();
    const clockEl = document.getElementById("clock");
    const dateEl = document.getElementById("date-sk");
    if(clockEl) clockEl.innerHTML = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    if(dateEl) dateEl.innerHTML = now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}

// 🌦️ POČASIE (TVOJE PÔVODNÉ IKONY)
async function loadWeather(){
    try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current=temperature_2m,weather_code");
        const data = await res.json();
        document.getElementById("temp").innerHTML = Math.round(data.current.temperature_2m) + "°";
        const code = data.current.weather_code;
        const icon = document.getElementById("icon");
        const hour = new Date().getHours();
        const isNight = (hour >= 20 || hour < 6);
        let type = "sun.png";
        if (code > 0 && code <= 3) type = isNight ? "clear-night.png" : "cloud.png";
        else if (code > 3) type = "rain.png"; 
        icon.src = "icons/" + type;
    } catch (e) { console.error("Počasie nevyšlo."); }
}

// 📋 OZNAMY
async function loadEvents(){
    try {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        const txt = await res.text();
        const json = JSON.parse(txt.substring(47).slice(0,-2));
        const now = new Date();
        let html = "";
        let found = 0;
        json.table.rows.forEach(r => {
            if(!r.c) return;
            let dateVal = r.c[1]?.f || r.c[1]?.v || "";
            let note = r.c[3]?.v || "";
            if (!note) return;
            let isToday = dateVal.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`);
            if(isToday) {
                found++;
                html += `<div style="margin-bottom: 20px;"><span style="color: #ffeb3b;">✨</span> ${note}</div>`;
            }
        });
        document.getElementById("event").innerHTML = found ? html : "<span style='opacity:0.5;'>✨ Žiadne udalosti dnes</span>";
    } catch (e) { document.getElementById("event").innerHTML = "❌ Chyba načítania"; }
}

// 🌿 LOGIKA FLÓRY
let plants = JSON.parse(localStorage.getItem('myPlants')) || [];

function renderPlants() {
    const grid = document.getElementById("floraGrid");
    grid.innerHTML = plants.map(p => `
        <div class="plant-card">
            <img src="${p.img || 'icons/sun.png'}">
            <h3>${p.name}</h3>
            <p>${p.room}</p>
        </div>
    `).join('');
}

function addNewPlant() {
    const name = prompt("Názov rastliny:");
    if(name) {
        plants.push({ name: name, room: "Obývačka", img: "" });
        localStorage.setItem('myPlants', JSON.stringify(plants));
        renderPlants();
    }
}

function handleCamera(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            plants.push({ name: "Nová", room: "Sken", img: e.target.result });
            localStorage.setItem('myPlants', JSON.stringify(plants));
            renderPlants();
        };
        reader.readAsDataURL(file);
    }
}

// 🔁 NAVIGÁCIA (OPRAVENÁ)
function showFlora(){
    document.getElementById("home-content").style.display = "none";
    document.getElementById("flora").style.display = "block";
    renderPlants();
}

function showHome(){
    document.getElementById("home-content").style.display = "block";
    document.getElementById("flora").style.display = "none";
}

// SPUSTENIE
updateClock();
loadWeather();
loadEvents();
setInterval(updateClock, 1000);
setInterval(loadWeather, 600000);
setInterval(loadEvents, 60000);
// 🌿 LOGIKA PRE FLÓRU (PRIDANÁ NA KONIEC TVOJHO SKRIPTU)
let plants = JSON.parse(localStorage.getItem('myPlants')) || [];

function renderPlants() {
    const grid = document.getElementById("floraGrid");
    if(!grid) return;
    grid.innerHTML = plants.map(p => `
        <div style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 10px;">
            <img src="${p.img || 'icons/sun.png'}" style="width: 100%; height: 100px; object-fit: contain;">
            <h4 style="margin: 5px 0;">${p.name}</h4>
        </div>
    `).join('');
}

function addNewPlant() {
    const name = prompt("Názov:");
    if(name) {
        plants.push({ name: name, img: "" });
        localStorage.setItem('myPlants', JSON.stringify(plants));
        renderPlants();
    }
}

function handleCamera(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            plants.push({ name: "Nová", img: e.target.result });
            localStorage.setItem('myPlants', JSON.stringify(plants));
            renderPlants();
        };
        reader.readAsDataURL(file);
    }
}

// Spusti vykreslenie hneď pri načítaní
renderPlants();
</script>

</body>
</html>
