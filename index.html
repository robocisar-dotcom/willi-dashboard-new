<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLI</title>

<style>

/* =========================
   🎨 LAYOUT – ZÁKLAD
========================= */

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* pozadie */
body::before{
    content:"";
    position:absolute;
    left:-40%;
    top:-20%;
    width:120%;
    height:120%;
    border-radius:50%;
    background:radial-gradient(circle, #0b2a4a 0%, transparent 70%);
    opacity:0.6;
}


/* =========================
   🧱 LAYOUT – HLAVNÝ OBSAH
========================= */

.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:70vh;
    padding:0 5vw;
    gap:50px;
}


/* =========================
   ⏰ HODINY
========================= */

#clock{
    font-size:clamp(80px,12vw,160px);
    font-weight:800;
}

#date{
    opacity:0.7;
}


/* =========================
   🌦️ POČASIE
========================= */

.weather-icon{
    width: clamp(250px, 25vw, 500px);
    display:block;
    margin:auto;
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.7));
}

#temp{
    font-size: clamp(40px, 6vw, 100px);
    text-align:center;
}

#desc{
    text-align:center;
}


/* =========================
   📋 EVENT
========================= */

.event{
    text-align:center;
    margin-top:-40px;
}


/* =========================
   📱 MENU
========================= */

.cards{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:rgba(20,20,20,0.9);
    padding:20px 0;
}


/* =========================
   🌿 FLÓRA – ŠTÝLY
========================= */

#floraGrid{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
}

.plant-card{
    width:200px;
    background:#111;
    border-radius:16px;
    padding:12px;
}

.plant-card.good{ box-shadow:0 0 10px green; }
.plant-card.warning{ box-shadow:0 0 10px orange; }
.plant-card.danger{ box-shadow:0 0 10px red; }

.progress{
    height:6px;
    background:#333;
    border-radius:10px;
}

.bar{
    height:100%;
    background:lime;
}

</style>
</head>

<body>

<!-- =========================
     🏠 DOMOV
========================= -->

<div class="main">

    <div>
        <div id="clock"></div>
        <div id="date"></div>
    </div>

    <div>
        <img id="icon" class="weather-icon">
        <div id="temp"></div>
        <div id="desc"></div>
    </div>

</div>


<!-- =========================
     📋 EVENTY
========================= -->

<div class="event" id="event">Načítavam...</div>


<!-- =========================
     🌿 FLÓRA
========================= -->

<section id="flora" style="display:none;">
    <div id="floraGrid"></div>
</section>


<!-- =========================
     📱 MENU
========================= -->

<div class="cards">
    <div>🏠<br>DOMOV</div>
    <div onclick="showFlora()">🌿<br>FLÓRA</div>
</div>


<script>

/* =========================
   ⏰ HODINY
========================= */

function updateClock(){
    const now = new Date();
    clock.innerHTML =
        now.getHours().toString().padStart(2,'0') + ":" +
        now.getMinutes().toString().padStart(2,'0');

    date.innerHTML =
        now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(updateClock,1000);
updateClock();


/* =========================
   🌦️ POČASIE
========================= */

async function loadWeather(){
    try{
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current_weather=true");
        const data = await res.json();

        temp.innerHTML = data.current_weather.temperature + "°";

        icon.src = "icons/sun.png";
        desc.innerHTML = "Počasie";

    }catch{
        desc.innerHTML="Chyba";
    }
}
loadWeather();


/* =========================
   📋 EVENTY
========================= */

const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

async function loadEvents(){
    try{
        let res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        let txt = await res.text();
        let json = JSON.parse(txt.substring(47).slice(0,-2));

        let now = new Date();
        let found = null;

        json.table.rows.forEach(r=>{
            if(!r.c) return;

            let cell = r.c[1];
            let isToday = false;

            if(cell?.v?.startsWith("Date(")){
                let parts = cell.v.match(/\d+/g);
                let y = +parts[0], m = +parts[1], d = +parts[2];
                let today = new Date();

                isToday =
                    d === today.getDate() &&
                    m === today.getMonth() &&
                    y === today.getFullYear();
            }

            if(!isToday) return;

            let auto = r.c[2]?.v || "";
            let note = r.c[3]?.v || "";

            found = {auto,note};
        });

        event.innerHTML = found
            ? `✨ ${found.note}<br>(${found.auto})`
            : "✨ nič dnes";

    }catch{
        event.innerHTML="❌ chyba";
    }
}
loadEvents();


/* =========================
   🌿 FLÓRA – DATA
========================= */

const plantLibrary = {
  mint: { interval: 3 },
  rosemary: { interval: 7 }
};

let plants = [
  {
    id:1,
    type:"mint",
    name:"Mäta",
    location:"Balkón",
    lastWatered:Date.now()-2*86400000
  }
];


/* =========================
   🌿 FLÓRA – LOGIKA
========================= */

function getPlantStatus(p){
  let days = (Date.now()-p.lastWatered)/86400000;
  let progress = days / plantLibrary[p.type].interval;

  let status="good";
  if(progress>=1) status="danger";
  else if(progress>=0.7) status="warning";

  return {status,progress:Math.min(progress,1)};
}


/* =========================
   🌿 FLÓRA – RENDER
========================= */

function renderPlants(){
  floraGrid.innerHTML="";

  plants.forEach(p=>{
    let {status,progress}=getPlantStatus(p);

    let card=document.createElement("div");
    card.className="plant-card "+status;

    card.innerHTML=`
      <h3>${p.name}</h3>
      <p>${p.location}</p>
      <div class="progress">
        <div class="bar" style="width:${progress*100}%"></div>
      </div>
    `;

    card.onclick=()=>waterPlant(p.id);

    floraGrid.appendChild(card);
  });
}


/* =========================
   🌿 FLÓRA – AKCIE
========================= */

function waterPlant(id){
  let p=plants.find(x=>x.id===id);
  p.lastWatered=Date.now();
  renderPlants();
}


/* =========================
   🔁 NAVIGÁCIA
========================= */

function showFlora(){
  document.querySelector(".main").style.display="none";
  event.style.display="none";

  flora.style.display="block";
  renderPlants();
}

</script>

</body>
</html>
