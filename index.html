<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLI</title>

<style>

/* =========================
   🎨 LAYOUT – ZÁKLAD (BEGIN)
========================= */

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* pozadie */
body::before{
    content:"";
    position:absolute;
    left:-40%;
    top:-20%;
    width:120%;
    height:120%;
    border-radius:50%;
    background:radial-gradient(circle, #0b2a4a 0%, transparent 70%);
    opacity:0.6;
}

/* =========================
   🎨 LAYOUT – ZÁKLAD (END)
========================= */


/* =========================
   🧱 LAYOUT – HLAVNÝ OBSAH (BEGIN)
========================= */

.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:70vh;
    padding:0 5vw;
    gap:50px;
}

/* =========================
   🧱 LAYOUT – HLAVNÝ OBSAH (END)
========================= */


/* =========================
   ⏰ HODINY (BEGIN)
========================= */

#clock{
    font-size:clamp(80px,12vw,160px);
    font-weight:800;
}

#date-sk{
    opacity:0.7;
}

/* =========================
   ⏰ HODINY (END)
========================= */


/* =========================
   🌦️ POČASIE (BEGIN)
========================= */

.weather-icon{
    width: clamp(250px, 25vw, 500px);
}

#temp{
    font-size: clamp(40px, 6vw, 100px);
    text-align:center;
}

#desc{
    text-align:center;
}

/* =========================
   🌦️ POČASIE (END)
========================= */


/* =========================
   📋 EVENTY (BEGIN)
========================= */

.event{
    text-align:center;
    margin-top:-40px;
}

/* =========================
   📋 EVENTY (END)
========================= */


/* =========================
   📱 MENU (BEGIN)
========================= */

.cards{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:rgba(20,20,20,0.9);
    padding:20px 0;
}

/* =========================
   📱 MENU (END)
========================= */


/* =========================
   🌿 FLÓRA – ŠTÝLY (BEGIN)
========================= */

#floraGrid{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
}

.plant-card{
    width:200px;
    background:#111;
    border-radius:16px;
    padding:12px;
}

.plant-card.good{ box-shadow:0 0 10px green; }
.plant-card.warning{ box-shadow:0 0 10px orange; }
.plant-card.danger{ box-shadow:0 0 10px red; }

.progress{
    height:6px;
    background:#333;
}

.bar{
    height:100%;
    background:lime;
}

/* =========================
   🌿 FLÓRA – ŠTÝLY (END)
========================= */

</style>
</head>

<body>

<!-- =========================
     🏠 DOMOV (BEGIN)
========================= -->

<div class="main">

    <div>
        <div id="clock"></div>
        <div id="date-sk"></div>
    </div>

    <div>
        <img id="icon" class="weather-icon">
        <div id="temp"></div>
        <div id="desc"></div>
    </div>

</div>

<!-- =========================
     🏠 DOMOV (END)
========================= -->


<!-- =========================
     📋 EVENTY (BEGIN)
========================= -->

<div class="event" id="event">Načítavam...</div>

<!-- =========================
     🌿 FLÓRA (BEGIN)
========================= -->
<section id="flora" style="display:none;">

    <div style="padding:20px;">
        <button onclick="addPlant()">+ Pridať rastlinu</button>
    </div>

    <div id="floraGrid"></div>

</section>
<!-- =========================
     🌿 FLÓRA (END)
========================= -->

<!-- =========================
     📋 EVENTY (END)
========================= -->


<!-- =========================
     🌿 FLÓRA (BEGIN)
========================= -->

<section id="flora" style="display:none;">

    <!-- ADD BUTTON -->
    <div style="padding:20px;">
        <button onclick="addPlant()">+ Pridať rastlinu</button>
    </div>

    <div id="floraGrid"></div>

</section>

<!-- =========================
     🌿 FLÓRA (END)
========================= -->


<!-- =========================
     📱 MENU (BEGIN)
========================= -->

<div class="cards">
    <div onclick="showHome()">🏠<br>DOMOV</div>
    <div onclick="showFlora()">🌿<br>FLÓRA</div>
</div>

<!-- =========================
     📱 MENU (END)
========================= -->


<script>

/* =========================
   ⏰ HODINY (BEGIN)
========================= */

function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.getHours().toString().padStart(2,'0') + ":" +
        now.getMinutes().toString().padStart(2,'0');

    document.getElementById("date-sk").innerHTML =
        now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(updateClock,1000);
updateClock();

/* =========================
   ⏰ HODINY (END)
========================= */


/* =========================
   🌦️ POČASIE (BEGIN)
========================= */

async function loadWeather(){
    try{
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current_weather=true");
        const data = await res.json();

        document.getElementById("temp").innerHTML = data.current_weather.temperature + "°";

        document.getElementById("icon").src = "icons/sun.png";
        document.getElementById("desc").innerHTML = "Počasie";

    }catch{
        document.getElementById("desc").innerHTML="Chyba";
    }
}
loadWeather();

/* =========================
   🌦️ POČASIE (END)
========================= */


/* =========================
   📋 EVENTY (BEGIN)
========================= */

const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

async function loadEvents(){
    try{
        let res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        let txt = await res.text();
        let json = JSON.parse(txt.substring(47).slice(0,-2));

        let today = new Date();
        let found = null;

        json.table.rows.forEach(r=>{
            if(!r.c) return;

            let cell = r.c[1];
            let isToday = false;

            if(cell?.v?.startsWith("Date(")){
                let parts = cell.v.match(/\d+/g);
                let y = +parts[0], m = +parts[1], d = +parts[2];

                isToday =
                    d === today.getDate() &&
                    m === today.getMonth() &&
                    y === today.getFullYear();
            }

            if(!isToday) return;

            let auto = r.c[2]?.v || "";
            let note = r.c[3]?.v || "";

            found = {auto,note};
        });

        document.getElementById("event").innerHTML = found
            ? `✨ ${found.note}<br>(${found.auto})`
            : "✨ nič dnes";

    }catch{
        document.getElementById("event").innerHTML="❌ chyba";
    }
}
loadEvents();

/* =========================
   📋 EVENTY (END)
========================= */


/* =========================
   🌿 FLÓRA – DATA (BEGIN)
========================= */

const plantLibrary = {
  mint: { interval: 3 },
  rosemary: { interval: 7 }
};

let plants = [
  {
    id:1,
    type:"mint",
    name:"Mäta",
    location:"Balkón",
    lastWatered:Date.now()-2*86400000
  }
];

/* =========================
   🌿 FLÓRA – DATA (END)
========================= */


/* =========================
   🌿 FLÓRA – LOGIKA (BEGIN)
========================= */

function getPlantStatus(p){
  let days = (Date.now()-p.lastWatered)/86400000;
  let progress = days / plantLibrary[p.type].interval;

  let status="good";
  if(progress>=1) status="danger";
  else if(progress>=0.7) status="warning";

  return {status,progress:Math.min(progress,1)};
}

/* =========================
   🌿 FLÓRA – LOGIKA (END)
========================= */


/* =========================
   🌿 FLÓRA – RENDER (BEGIN)
========================= */

function renderPlants(){
  document.getElementById("floraGrid").innerHTML="";

  plants.forEach(p=>{
    let {status,progress}=getPlantStatus(p);

    let card=document.createElement("div");
    card.className="plant-card "+status;

    card.innerHTML=`
      <h3>${p.name}</h3>
      <p>${p.location}</p>
      <div class="progress">
        <div class="bar" style="width:${progress*100}%"></div>
      </div>
    `;

    card.onclick=()=>waterPlant(p.id);

    document.getElementById("floraGrid").appendChild(card);
  });
}

/* =========================
   🌿 FLÓRA – RENDER (END)
========================= */


/* =========================
   🌿 FLÓRA – AKCIE (BEGIN)
========================= */

function waterPlant(id){
  let p=plants.find(x=>x.id===id);
  p.lastWatered=Date.now();
  renderPlants();
}

/* =========================
   🌿 FLÓRA – AKCIE (END)
========================= */


/* =========================
   🔁 NAVIGÁCIA (BEGIN)
========================= */

function showFlora(){
  document.querySelector(".main").style.display="none";
  document.getElementById("event").style.display="none";
  document.getElementById("flora").style.display="block";
  renderPlants();
}

function showHome(){
  document.querySelector(".main").style.display="";
  document.getElementById("event").style.display="";
  document.getElementById("flora").style.display="none";
}

/* =========================
   🔁 NAVIGÁCIA (END)
========================= */
/* =========================
   🌿 FLÓRA – PRIDAŤ RASTLINU (END)
========================= */
/* =========================
   🔁 NAVIGÁCIA (END)
========================= */
/* =========================
   🌿 ADD PLANT (BEGIN)
========================= */

function addPlant(){

  let name = prompt("Názov rastliny?");
  if(!name) return;

  let type = prompt("Typ (mint / rosemary)?");
  if(!plantLibrary[type]){
    alert("Použi mint alebo rosemary");
    return;
  }

  let location = prompt("Miesto?");

  plants.push({
    id: Date.now(),
    type: type,
    name: name,
    location: location,
    lastWatered: Date.now()
  });

  renderPlants();
}

/* =========================
   🌿 ADD PLANT (END)
========================= */
</script>

</body>
</html>
