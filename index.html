<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLI</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
}

body::before{
    content:"";
    position:absolute;
    left:-40%;
    top:-20%;
    width:120%;
    height:120%;
    border-radius:50%;
    background:radial-gradient(circle, #0b2a4a 0%, transparent 70%);
    opacity:0.6;
}

.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:70vh;
    padding:0 5vw;
}

#clock{font-size:120px;}
#date-sk{opacity:0.7;}

.weather-icon{width:250px;}

.event{text-align:center;}

.cards{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#111;
    padding:15px;
}

#floraGrid{
    display:flex;
    gap:20px;
    padding:20px;
}
    /* Container pre počasie, aby bolo všetko pod sebou a v strede */
.weather-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

#temp {
    font-size: 80px; /* Zväčšenie písma teploty */
    margin-top: -20px; /* Posunutie bližšie k ikone */
}

#desc {
    font-size: 20px;
    opacity: 0.8;
}
</style>
</head>

<body>

<!-- DOMOV -->
<div class="main">
    <div>
        <div id="clock"></div>
        <div id="date-sk"></div>
    </div>

    <!-- Upravená časť pre počasie -->
    <div class="weather-container">
        <img id="icon" src="icons/sun.png" class="weather-icon">
        <div id="temp">--°</div>
        <div id="desc"></div>
    </div>
</div>

<div class="event" id="event">Načítavam...</div>

<!-- FLÓRA -->
<section id="flora" style="display:none;">
    <div style="padding:20px;">
        <button onclick="addPlant()">+ Pridať rastlinu</button>
    </div>
    <div id="floraGrid"></div>
</section>

<!-- MENU -->
<div class="cards">
    <div onclick="showHome()">🏠</div>
    <div onclick="showFlora()">🌿</div>
</div>

<script>

/* ⏰ HODINY */
function updateClock(){
    let now = new Date();
    document.getElementById("clock").innerHTML =
        now.getHours().toString().padStart(2,'0') + ":" +
        now.getMinutes().toString().padStart(2,'0');

    document.getElementById("date-sk").innerHTML =
        now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(updateClock,1000);
updateClock();

/* 🌙 DEN/NOC */
function isNight(){
    let h = new Date().getHours();
    return (h >= 20 || h < 6);
}

/* 🌦️ IKONY */
const weatherMap = {
  clear:{day:"sun.png",night:"clear-night.png"},
  cloudy:{day:"cloud.png",night:"cloudy-night.png"},
  rain:{day:"rain.png",night:"rain-night.png"},
  snow:{day:"snow.png",night:"snow.png"}
};

function setWeather(type){
  let icon = document.getElementById("icon");
  let data = weatherMap[type];
  if(!data) return;
  icon.src = "icons/" + (isNight()?data.night:data.day);
}

/* 🌦️ POČASIE – OPRAVENÉ */
function loadWeather(){
    fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current=temperature_2m,weather_code")
    .then(res => res.json())
    .then(data => {

        document.getElementById("temp").innerHTML =
            Math.round(data.current.temperature_2m) + "°";

        let code = data.current.weather_code;

        if(code === 0) setWeather("clear");
        else if(code <= 3) setWeather("cloudy");
        else if(code <= 67) setWeather("rain");
        else if(code <= 77) setWeather("snow");

    })
    .catch(()=>{
        document.getElementById("desc").innerHTML="Chyba počasia";
    });
}
loadWeather();

/* 📋 SHEETS – FUNKČNÉ */
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';
/* 📋 FINÁLNA VERZIA OZNAMOV */
function loadEvents(){
    fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`)
    .then(res => res.text())
    .then(txt => {
        // Spracovanie surového textu z Google Sheets do JSON formátu
        let json = JSON.parse(txt.substring(47).slice(0,-2));
        let now = new Date();
        let html = "";
        let found = 0;

        json.table.rows.forEach(r => {
            if(!r.c) return;

            // Získanie hodnôt zo stĺpcov: B (Dátum), C (Meno/Auto), D (Text oznamu)
            let dateVal = r.c[1]?.f || r.c[1]?.v || "";
            let auto = r.c[2]?.v || "";
            let note = r.c[3]?.v || "";

            // 1. KONTROLA: Ak je bunka s textom (stĺpec D) prázdna, riadok úplne preskoč
            if (!note || note.toString().trim() === "") return;

            // 2. KONTROLA DÁTUMU: Či sa dátum v tabuľke zhoduje s dneškom
            let isToday = 
                dateVal.includes(`Date(${now.getFullYear()},${now.getMonth()},${now.getDate()}`) || 
                dateVal.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`);

            if(!isToday) return;

            // Ak prešiel dátum aj text, ideme vykresľovať
            found++;

            // Zátvorky s menom (auto) sa pridajú, len ak nie sú prázdne
            let subText = (auto && auto.toString().trim() !== "") 
                ? `<br><small style="opacity:0.6; font-size: 0.7em;">(${auto})</small>` 
                : "";

            // Pridanie riadku do výsledného zoznamu
            html += `<div style="margin-bottom: 25px; line-height: 1.4;">
                        <span style="color: #ffeb3b;">✨</span> ${note}${subText}
                     </div>`;
        });

        // Ak sa nič nenašlo, vypíše sa predvolený text
        document.getElementById("event").innerHTML = 
            found ? html : "<span style='opacity:0.5;'>✨ Žiadne udalosti dnes</span>";

    })
    .catch(err => {
        console.error("Chyba Sheets:", err);
        document.getElementById("event").innerHTML = "❌ Chyba spojenia s tabuľkou";
    });
}


</script>

</body>
</html>
