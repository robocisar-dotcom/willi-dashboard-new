<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WILLI Smart Dashboard</title>

<style>
/* ZÁKLADNÉ NASTAVENIA */
:root {
    --bg-color: #000;
    --accent-blue: #0b2a4a;
    --text-main: #fff;
    --text-dim: rgba(255, 255, 255, 0.7);
}

body {
    margin: 0;
    padding: 0;
    background: var(--bg-color);
    color: var(--text-main);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* EFEKT ŽIARY NA POZADÍ */
body::before {
    content: "";
    position: fixed;
    left: -20%;
    top: -10%;
    width: 140%;
    height: 140%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
    opacity: 0.5;
    z-index: -1;
}

/* HLAVNÝ KONTAJNER (HODINY + POČASIE) */
.main {
    display: flex;
    flex-wrap: wrap; /* Umožní zalomenie na mobile */
    justify-content: space-around;
    align-items: center;
    padding: 5vh 5vw;
    gap: 20px;
    flex-grow: 1;
}

/* HODINY */
.clock-section {
    text-align: center;
    flex: 1;
    min-width: 300px;
}

#clock {
    font-size: clamp(5rem, 15vw, 10rem); /* Dynamická veľkosť písma */
    font-weight: 800;
    line-height: 1;
    margin: 0;
}

#date-sk {
    font-size: clamp(1.2rem, 3vw, 2rem);
    opacity: 0.8;
    text-transform: capitalize;
    margin-top: 10px;
}

/* POČASIE */
.weather-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    flex: 1;
    min-width: 250px;
}

.weather-icon {
    width: clamp(150px, 20vw, 250px);
    height: auto;
}

#temp {
    font-size: clamp(4rem, 10vw, 7rem);
    font-weight: bold;
    margin-top: -10px;
}

/* SEKCIÁ OZNAMOV */
.event-section {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
    min-height: 150px;
}

#event {
    font-size: clamp(1.3rem, 4vw, 2.2rem);
    line-height: 1.4;
}

/* MENU / KARTY DOLU */
.cards {
    width: 100%;
    display: flex;
    justify-content: center;
    background: rgba(17, 17, 17, 0.9);
    backdrop-filter: blur(10px);
    padding: 15px 0;
    gap: 50px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.nav-item {
    font-size: 35px;
    cursor: pointer;
    transition: transform 0.2s;
}

.nav-item:active {
    transform: scale(0.8);
}

/* FLÓRA STRÁNKA */
#flora {
    padding: 20px;
    text-align: center;
}

.flora-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

/* RESPONSÍVNE ÚPRAVY PRE MOBILY */
@media (max-width: 600px) {
    .main {
        flex-direction: column;
        justify-content: center;
        padding-top: 10vh;
    }
    #clock {
        font-size: 6rem;
    }
    .weather-icon {
        width: 180px;
    }
    .cards {
        gap: 30px;
    }
}
</style>
</head>

<body>

<div id="home-content">
    <div class="main">
        <!-- HODINY -->
        <div class="clock-section">
            <div id="clock">00:00</div>
            <div id="date-sk">...</div>
        </div>

        <!-- POČASIE -->
        <div class="weather-container">
            <img id="icon" src="icons/sun.png" class="weather-icon" alt="weather">
            <div id="temp">--°</div>
            <div id="desc"></div>
        </div>
    </div>

    <!-- OZNAMY -->
    <div class="event-section">
        <div id="event">Načítavam udalosti...</div>
    </div>
</div>

<!-- FLÓRA SEKCIÁ (skrytá) -->
<section id="flora" style="display:none;">
    <h2>🌿 Moja Flóra</h2>
    <button onclick="alert('Pridávanie čoskoro!')" style="padding:10px 20px; cursor:pointer;">+ Pridať rastlinu</button>
    <div id="floraGrid" class="flora-grid">
        <!-- Sem pôjdu karty rastlín -->
    </div>
</section>

<!-- SPODNÁ NAVIGÁCIA -->
<div class="cards">
    <div class="nav-item" onclick="showHome()">🏠</div>
    <div class="nav-item" onclick="showFlora()">🌿</div>
</div>

<script>
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

// ⏰ HODINY A DÁTUM
function updateClock(){
    const now = new Date();
    const clockEl = document.getElementById("clock");
    const dateEl = document.getElementById("date-sk");

    if(clockEl) clockEl.innerHTML = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    if(dateEl) dateEl.innerHTML = now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}

// 🌦️ POČASIE
async function loadWeather(){
    try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current=temperature_2m,weather_code");
        const data = await res.json();
        
        document.getElementById("temp").innerHTML = Math.round(data.current.temperature_2m) + "°";
        
        const code = data.current.weather_code;
        const icon = document.getElementById("icon");
        const hour = new Date().getHours();
        const isNight = (hour >= 20 || hour < 6);

        // Jednoduchá logika ikon
        let type = "sun.png";
        if (code > 0 && code <= 3) type = isNight ? "clear-night.png" : "cloud.png";
        else if (code > 3) type = "rain.png"; 
        
        icon.src = "icons/" + type;
    } catch (e) {
        console.error("Počasie nevyšlo.");
    }
}

// 📋 GOOGLE SHEETS OZNAMY
async function loadEvents(){
    try {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        const txt = await res.text();
        const json = JSON.parse(txt.substring(47).slice(0,-2));
        
        const now = new Date();
        let html = "";
        let found = 0;

        json.table.rows.forEach(r => {
            if(!r.c) return;
            let dateVal = r.c[1]?.f || r.c[1]?.v || "";
            let auto = r.c[2]?.v || "";
            let note = r.c[3]?.v || "";

            if (!note || note.toString().trim() === "") return;

            let isToday = dateVal.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`) || 
                          dateVal.includes(`Date(${now.getFullYear()},${now.getMonth()},${now.getDate()}`);

            if(isToday) {
                found++;
                let subText = auto ? `<br><small style="opacity:0.6; font-size: 0.6em;">(${auto})</small>` : "";
                html += `<div style="margin-bottom: 20px;"><span style="color: #ffeb3b;">✨</span> ${note}${subText}</div>`;
            }
        });

        document.getElementById("event").innerHTML = found ? html : "<span style='opacity:0.5;'>✨ Žiadne udalosti dnes</span>";
    } catch (e) {
        document.getElementById("event").innerHTML = "❌ Chyba načítania";
    }
}

// 🔁 NAVIGÁCIA
function showFlora(){
    document.getElementById("home-content").style.display = "none";
    document.getElementById("flora").style.display = "block";
}

function showHome(){
    document.getElementById("home-content").style.display = "block";
    document.getElementById("flora").style.display = "none";
}

// SPUSTENIE
updateClock();
loadWeather();
loadEvents();
setInterval(updateClock, 1000);
setInterval(loadWeather, 600000);
setInterval(loadEvents, 60000);
</script>

</body>
</html>
