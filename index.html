<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WILLI SMART HUB</title>

<style>
:root {
    --bg-color: #0d0d0d; /* Úplne tmavé pozadie podľa tvojej predlohy */
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
}

body {
    margin: 0; 
    background: var(--bg-color); 
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    min-height: 100vh;
    overflow-x: hidden;
}

/* --- OBRAZOVKA DOMOV --- */
.main-screen {
    display: flex; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box;
}

.home-top {
    display: flex; justify-content: space-between; align-items: center; flex-grow: 1; padding: 0 5vw;
}

#clock { font-size: clamp(5rem, 15vw, 10rem); font-weight: 800; line-height: 1; letter-spacing: -2px; }
#date-sk { font-size: clamp(1.2rem, 3vw, 2rem); opacity: 0.6; margin-top: 10px; }

.weather-container { text-align: center; }
.weather-icon { width: clamp(120px, 18vw, 220px); filter: drop-shadow(0 0 20px rgba(255,255,255,0.1)); }
#temp { font-size: clamp(3rem, 8vw, 6rem); font-weight: 700; }

#event-box { text-align: center; padding: 40px 20px; font-size: 1.3rem; min-height: 80px; opacity: 0.8; }

/* --- OBRAZOVKA FLÓRA --- */
#flora-screen { display: none; padding-bottom: 160px; min-height: 100vh; }

.flora-top-bar {
    display: flex; justify-content: center; gap: 12px; padding: 30px 20px;
}

.top-pill {
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    padding: 10px 20px; border-radius: 14px; backdrop-filter: blur(20px); font-size: 0.85rem;
    color: rgba(255,255,255,0.8);
}

.flora-grid {
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; padding: 0 20px; max-width: 1400px; margin: 0 auto;
}

/* KARTA RASTLINY - IDENTICKÁ S OBRÁZKOM */
.plant-card {
    background: var(--glass); border-radius: 20px; padding: 16px;
    border: 1px solid var(--glass-border); cursor: pointer;
    transition: all 0.2s ease; position: relative;
}
.plant-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }

.plant-card img { width: 100%; height: 140px; object-fit: contain; margin-bottom: 12px; }
.plant-card h3 { margin: 0; font-size: 1rem; font-weight: 600; }
.plant-card p { margin: 2px 0; font-size: 0.75rem; opacity: 0.5; }

.status-label { font-size: 0.7rem; margin-top: 12px; font-weight: 500; }
.prog-bg { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* FIXNÉ TLAČIDLO PRIDAŤ RASTLINU */
.add-btn-wrap {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 100;
}
.btn-add-main {
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: white;
    padding: 10px 24px; border-radius: 30px; backdrop-filter: blur(15px); cursor: pointer;
    font-size: 0.9rem; display: flex; align-items: center; gap: 8px; font-weight: 500;
}

/* --- MENU BAR --- */
.nav-bar {
    position: fixed; bottom: 0; width: 100%; display: flex; justify-content: center;
    background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(30px);
    padding: 15px 0; gap: 80px; border-top: 1px solid var(--glass-border); z-index: 500;
}
.nav-icon { font-size: 28px; cursor: pointer; opacity: 0.3; transition: 0.3s; }
.nav-icon.active { opacity: 1; transform: translateY(-3px); }

/* DETAIL OVERLAY (Prvá foto) */
.detail-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 1000; display: none; overflow-y: auto; padding: 20px;
}
</style>
</head>

<body>

<!-- DOMOV -->
<div id="home-screen" class="main-screen">
    <div class="home-top">
        <div>
            <div id="clock">00:00</div>
            <div id="date-sk">Načítavam...</div>
        </div>
        <div class="weather-container">
            <img id="icon" src="https://openweathermap.org/img/wn/01d@4x.png" class="weather-icon">
            <div id="temp">--°</div>
        </div>
    </div>
    <div id="event-box">Načítavam udalosti...</div>
</div>

<!-- FLÓRA -->
<div id="flora-screen">
    <div class="flora-top-bar">
        <div class="top-pill" id="flora-date">July 19, 2025 15h30</div>
        <div class="top-pill" id="flora-temp-small">Sunny, 28°C</div>
    </div>

    <div id="floraGrid" class="flora-grid">
        <!-- Zoznam je na začiatku prázdny -->
    </div>

    <div class="add-btn-wrap">
        <button class="btn-add-main" onclick="addNewPlant()">
            <span>+</span> Pridať rastlinu
        </button>
    </div>
</div>

<!-- NAVIGÁCIA -->
<div class="nav-bar">
    <div id="nav-home" class="nav-icon active" onclick="showScreen('home')">🏠</div>
    <div id="nav-flora" class="nav-icon" onclick="showScreen('flora')">🌿</div>
</div>

<script>
/* 🔑 LOGIKA */
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

// Inicializácia: PRÁZDNY ZOZNAM (stiahne z pamäte alebo nechá prázdne pole)
let plants = JSON.parse(localStorage.getItem('myPlants')) || [];

function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerHTML = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    document.getElementById("date-sk").innerHTML = now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
    document.getElementById("flora-date").innerHTML = now.toLocaleDateString('en-US',{month:'long', day:'numeric', year:'numeric'}) + " " + now.getHours() + "h" + now.getMinutes();
}

async function loadWeather(){
    try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current=temperature_2m,weather_code");
        const data = await res.json();
        const t = Math.round(data.current.temperature_2m) + "°";
        document.getElementById("temp").innerHTML = t;
        document.getElementById("flora-temp-small").innerHTML = "Sunny, " + t;
    } catch (e) {}
}

function renderPlants() {
    const grid = document.getElementById("floraGrid");
    grid.innerHTML = "";
    
    if (plants.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; margin-top: 100px; opacity: 0.2; font-size: 0.9rem;">Žiadne rastliny. Pridaj svoju prvú.</div>`;
    }

    plants.forEach((p, i) => {
        const lvl = p.waterLevel || 80;
        grid.innerHTML += `
            <div class="plant-card">
                <div style="position:absolute; top:12px; right:12px; opacity:0.3">⋮</div>
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p>${p.room}</p>
                <div class="status-label" style="color: ${lvl > 30 ? '#4caf50' : '#ff5252'}">
                    Stav: ${lvl > 30 ? 'Dobrý' : 'Treba poliať'}
                </div>
                <div class="prog-bg"><div class="prog-fill" style="width:${lvl}%; background:${lvl > 30 ? '#4caf50' : '#ff5252'}"></div></div>
                <p style="font-size:0.65rem; margin-top:8px; opacity:0.4">Poliatie: pred ${p.lastWatered || 0} dňami</p>
            </div>`;
    });
    localStorage.setItem('myPlants', JSON.stringify(plants));
}

function addNewPlant() {
    const name = prompt("Meno rastliny (napr. Zamiokulkas):");
    if(!name) return;
    const room = prompt("Miestnosť (napr. obývačka):") || "Domov";
    const img = prompt("URL obrázka (nechaj prázdne pre predvolený):") || "https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=400";
    
    plants.push({
        name: name,
        room: room,
        img: img,
        waterLevel: 100,
        lastWatered: 0
    });
    renderPlants();
}

function showScreen(screen) {
    document.getElementById("home-screen").style.display = (screen === 'home') ? 'flex' : 'none';
    document.getElementById("flora-screen").style.display = (screen === 'flora') ? 'block' : 'none';
    document.getElementById("nav-home").classList.toggle('active', screen === 'home');
    document.getElementById("nav-flora").classList.toggle('active', screen === 'flora');
    if(screen === 'flora') renderPlants();
}

// Spustenie
updateClock(); loadWeather();
setInterval(updateClock, 1000);
</script>

</body>
</html>
