<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLI</title>

<style>

/* =========================
   🎨 ZÁKLAD
========================= */
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
}

/* pozadie */
body::before{
    content:"";
    position:absolute;
    left:-40%;
    top:-20%;
    width:120%;
    height:120%;
    border-radius:50%;
    background:radial-gradient(circle, #0b2a4a 0%, transparent 70%);
    opacity:0.6;
}

/* =========================
   🧱 LAYOUT
========================= */
.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:70vh;
    padding:0 5vw;
}

/* =========================
   ⏰ HODINY
========================= */
#clock{
    font-size:120px;
}
#date-sk{
    opacity:0.7;
}

/* =========================
   🌦️ POČASIE
========================= */
.weather-icon{
    width:250px;
}
#temp{
    font-size:50px;
}

/* =========================
   📋 EVENT
========================= */
.event{
    text-align:center;
}

/* =========================
   📱 MENU
========================= */
.cards{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#111;
    padding:15px;
}

/* =========================
   🌿 FLÓRA
========================= */
#floraGrid{
    display:flex;
    gap:20px;
    padding:20px;
}

.plant-card{
    background:#111;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 15px green;
}

.progress{
    height:6px;
    background:#333;
}

.bar{
    height:100%;
    background:lime;
}

</style>
</head>

<body>

<!-- DOMOV -->
<div class="main">
    <div>
        <div id="clock"></div>
        <div id="date-sk"></div>
    </div>

    <div>
        <img id="icon" class="weather-icon">
        <div id="temp"></div>
        <div id="desc"></div>
    </div>
</div>

<div class="event" id="event">Načítavam...</div>

<!-- FLÓRA -->
<section id="flora" style="display:none;">
    <div style="padding:20px;">
        <button onclick="addPlant()">+ Pridať rastlinu</button>
    </div>
    <div id="floraGrid"></div>
</section>

<!-- MENU -->
<div class="cards">
    <div onclick="showHome()">🏠<br>DOMOV</div>
    <div onclick="showFlora()">🌿<br>FLÓRA</div>
</div>

<script>
/* =========================
   ⏰ HODINY
========================= */
function updateClock(){
  let now = new Date();
  document.getElementById("clock").innerHTML =
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0');

  document.getElementById("date-sk").innerHTML =
    now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(updateClock,1000);
updateClock();

/* =========================
   🌦️ POČASIE
========================= */
async function updateWeather(){
  try{
    let res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.3775&longitude=17.5883&current=temperature_2m,weather_code');
    let data = await res.json();

    document.getElementById('temp').innerText = Math.round(data.current.temperature_2m) + "°C";

    let code = data.current.weather_code;
    let icon = "☀️";

    if(code <= 3) icon = "🌤️";
    else if(code < 50) icon = "☁️";
    else if(code < 70) icon = "🌧️";
    else icon = "❄️";

    document.getElementById('icon').innerText = icon;

  }catch(e){
    document.getElementById('temp').innerText = "ERR";
  }
}
updateWeather();

/* =========================
   📋 EVENTY
========================= */
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

async function updateAgenda(){
  try{
    let res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
    let txt = await res.text();
    let json = JSON.parse(txt.substring(47).slice(0,-2));

    let now = new Date();
    let html = "";
    let found = 0;

    json.table.rows.forEach(r=>{
      if(!r.c) return;

      let val = r.c[1]?.f || r.c[1]?.v || "";

      let isToday =
        val.includes(`Date(${now.getFullYear()},${now.getMonth()},${now.getDate()}`) ||
        val.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`);

      if(!isToday) return;

      let C = r.c[2]?.v || "";
      let D = r.c[3]?.v || "";

      html += `<div>⭐ ${D || C}</div>`;
      found++;
    });

    document.getElementById("event").innerHTML = found ? html : "✨ nič na dnes";

  }catch(e){
    document.getElementById("event").innerHTML = "❌ chyba";
  }
}
updateAgenda();

/* =========================
   🔁 NAVIGÁCIA
========================= */
function showFlora(){
  document.querySelector(".main").style.display="none";
  document.getElementById("event").style.display="none";
  document.getElementById("flora").style.display="block";
}

function showHome(){
  document.querySelector(".main").style.display="flex";
  document.getElementById("event").style.display="block";
  document.getElementById("flora").style.display="none";
}

/* =========================
   🌿 TLAČIDLO TEST
========================= */
function addPlant(){
  alert("fungujem 💥");
}

</script>

</body>
</html>
