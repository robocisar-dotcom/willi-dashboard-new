<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLI</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
}

/* POZADIE */
body::before{
    content:"";
    position:absolute;
    left:-40%;
    top:-20%;
    width:120%;
    height:120%;
    border-radius:50%;
    background:radial-gradient(circle, #0b2a4a 0%, transparent 70%);
    opacity:0.6;
}

/* LAYOUT */
.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:70vh;
    padding:0 5vw;
}

/* HODINY */
#clock{font-size:120px;}
#date-sk{opacity:0.7;}

/* POČASIE */
.weather-icon{
    width:250px;
}

/* EVENT */
.event{
    text-align:center;
}

/* MENU */
.cards{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#111;
    padding:15px;
}

/* FLORA */
#floraGrid{
    display:flex;
    gap:20px;
    padding:20px;
}
.plant-card{
    background:#111;
    padding:15px;
    border-radius:15px;
}
</style>
</head>

<body>

<!-- DOMOV -->
<div class="main">
    <div>
        <div id="clock"></div>
        <div id="date-sk"></div>
    </div>

    <div>
        <img id="icon" src="icons/sun.png" class="weather-icon">
        <div id="temp"></div>
        <div id="desc"></div>
    </div>
</div>

<div class="event" id="event">Načítavam...</div>

<!-- FLORA -->
<section id="flora" style="display:none;">
    <div style="padding:20px;">
        <button onclick="addPlant()">+ Pridať rastlinu</button>
    </div>
    <div id="floraGrid"></div>
</section>

<!-- MENU -->
<div class="cards">
    <div onclick="showHome()">🏠</div>
    <div onclick="showFlora()">🌿</div>
</div>

<script>

/* HODINY */
function updateClock(){
    let now = new Date();
    clock.innerHTML =
        now.getHours().toString().padStart(2,'0') + ":" +
        now.getMinutes().toString().padStart(2,'0');

    date_sk.innerHTML =
        now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(updateClock,1000);
updateClock();

/* DEN/NOC */
function isNight(){
    let h = new Date().getHours();
    return (h >= 20 || h < 6);
}

/* IKONY */
const weatherMap = {
  clear:{day:"sun.png",night:"clear-night.png"},
  cloudy:{day:"cloud.png",night:"cloudy-night.png"},
  rain:{day:"rain.png",night:"rain-night.png"},
  snow:{day:"snow.png",night:"snow.png"}
};

function setWeather(type){
  let icon = document.getElementById("icon");
  let data = weatherMap[type];
  if(!data) return;
  icon.src = "icons/" + (isNight()?data.night:data.day);
}

/* POCASIE */
async function loadWeather(){
    try{
        let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current_weather=true");
        let data = await res.json();

        temp.innerHTML = data.current_weather.temperature + "°";

        let code = data.current_weather.weathercode;

        if(code===0) setWeather("clear");
        else if(code<=3) setWeather("cloudy");
        else if(code<=67) setWeather("rain");
        else if(code<=77) setWeather("snow");

    }catch(e){
        desc.innerHTML="Chyba počasia";
    }
}
loadWeather();

/* EVENTS */
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

async function loadEvents(){
    try{
        let res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`);
        let txt = await res.text();
        let json = JSON.parse(txt.substring(47).slice(0,-2));

        let now = new Date();
        let html = "";
        let found = 0;

        json.table.rows.forEach(r=>{
            if(!r.c) return;

            let val = r.c[1]?.f || r.c[1]?.v || "";

            let isToday =
                val.includes(`Date(${now.getFullYear()},${now.getMonth()},${now.getDate()}`) ||
                val.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`);

            if(!isToday) return;

            let C = r.c[2]?.v || "";
            let D = r.c[3]?.v || "";

            html += `<div>⭐ ${D || C}</div>`;
            found++;
        });

        event.innerHTML = found ? html : "✨ nič na dnes";

    }catch(e){
        event.innerHTML="❌ chyba";
    }
}
loadEvents();

/* NAVIGACIA */
function showFlora(){
  document.querySelector(".main").style.display="none";
  event.style.display="none";
  flora.style.display="block";
}

function showHome(){
  document.querySelector(".main").style.display="flex";
  event.style.display="block";
  flora.style.display="none";
}

/* FLORA */
let plants = [];

function addPlant(){
  alert("tlačidlo funguje 💥");
}

</script>

</body>
</html>
