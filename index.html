<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLI</title>

<style>

/* =========================
   🎨 LAYOUT – ZÁKLAD (BEGIN)
========================= */

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* pozadie */
body::before{
    content:"";
    position:absolute;
    left:-40%;
    top:-20%;
    width:120%;
    height:120%;
    border-radius:50%;
    background:radial-gradient(circle, #0b2a4a 0%, transparent 70%);
    opacity:0.6;
}

/* =========================
   🎨 LAYOUT – ZÁKLAD (END)
========================= */


/* =========================
   🧱 LAYOUT – HLAVNÝ OBSAH (BEGIN)
========================= */

.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:70vh;
    padding:0 5vw;
    gap:50px;
}

/* =========================
   🧱 LAYOUT – HLAVNÝ OBSAH (END)
========================= */


/* =========================
   ⏰ HODINY (BEGIN)
========================= */

#clock{
    font-size:clamp(80px,12vw,160px);
    font-weight:800;
}

#date-sk{
    opacity:0.7;
}

/* =========================
   ⏰ HODINY (END)
========================= */


/* =========================
   🌦️ POČASIE (BEGIN)
========================= */

.weather-icon{
    width: clamp(250px, 25vw, 500px);
}

#temp{
    font-size: clamp(40px, 6vw, 100px);
    text-align:center;
}

#desc{
    text-align:center;
}

/* =========================
   🌦️ POČASIE (END)
========================= */


/* =========================
   📋 EVENTY (BEGIN)
========================= */

.event{
    text-align:center;
    margin-top:-40px;
}

/* =========================
   📋 EVENTY (END)
========================= */


/* =========================
   📱 MENU (BEGIN)
========================= */

.cards{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:rgba(20,20,20,0.9);
    padding:20px 0;
}

/* =========================
   📱 MENU (END)
========================= */


/* =========================
   🌿 FLÓRA – ŠTÝLY (BEGIN)
========================= */

#floraGrid{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
}

.plant-card{
    width:200px;
    background:#111;
    border-radius:16px;
    padding:12px;
}

.plant-card.good{ box-shadow:0 0 10px green; }
.plant-card.warning{ box-shadow:0 0 10px orange; }
.plant-card.danger{ box-shadow:0 0 10px red; }

.progress{
    height:6px;
    background:#333;
}

.bar{
    height:100%;
    background:lime;
}

/* =========================
   🌿 FLÓRA – ŠTÝLY (END)
========================= */

</style>
</head>

<body>

<!-- =========================
     🏠 DOMOV (BEGIN)
========================= -->

<div class="main">

    <div>
        <div id="clock"></div>
        <div id="date-sk"></div>
    </div>

    <div>
        <img id="icon" class="weather-icon">
        <div id="temp"></div>
        <div id="desc"></div>
    </div>

</div>

<!-- =========================
     🏠 DOMOV (END)
========================= -->


<!-- =========================
     📋 EVENTY (BEGIN)
========================= -->

<div class="event" id="event">Načítavam...</div>

<!-- =========================
     🌿 FLÓRA (BEGIN)
========================= -->
<section id="flora" style="display:block;">

    <div style="padding:20px;">
        <button onclick="addPlant()">+ Pridať rastlinu</button>
    </div>

   <div style="padding:20px;">
  <button onclick="alert('fungujem')">+ Pridať rastlinu</button>
</div>

<div id="floraGrid"></div>
</section>
<!-- =========================
     🌿 FLÓRA (END)
========================= -->

<!-- =========================
     📋 EVENTY (END)
========================= -->


<!-- =========================
     🌿 FLÓRA (BEGIN)
========================= -->

<section id="flora" style="display:none;">

    <!-- ADD BUTTON -->
    <div style="padding:20px;">
        <button onclick="addPlant()">+ Pridať rastlinu</button>
    </div>

    <div id="floraGrid"></div>

</section>

<!-- =========================
     🌿 FLÓRA (END)
========================= -->


<!-- =========================
     📱 MENU (BEGIN)
========================= -->

<div class="cards">
    <div onclick="showHome()">🏠<br>DOMOV</div>
    <div onclick="showFlora()">🌿<br>FLÓRA</div>
</div>

<!-- =========================
     📱 MENU (END)
========================= -->


<script>

/* TEST – MUSÍ VYSKOČIŤ PRI NAČÍTANÍ */
alert("JS beží");

/* =========================
   🔁 NAVIGÁCIA
========================= */

function showFlora(){
  document.querySelector(".main").style.display="none";
  document.getElementById("event").style.display="none";
  document.getElementById("flora").style.display="block";
}

function showHome(){
  document.querySelector(".main").style.display="";
  document.getElementById("event").style.display="";
  document.getElementById("flora").style.display="none";
}

/* =========================
   🌿 TEST BUTTON
========================= */

function addPlant(){
  alert("klik funguje 💥");
}

</script>
}
</body>
</html>
