<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLI</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
}

body::before{
    content:"";
    position:absolute;
    left:-40%;
    top:-20%;
    width:120%;
    height:120%;
    border-radius:50%;
    background:radial-gradient(circle, #0b2a4a 0%, transparent 70%);
    opacity:0.6;
}

.main{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:70vh;
    padding:0 5vw;
}

#clock{font-size:120px;}
#date-sk{opacity:0.7;}

.weather-icon{width:250px;}

.event{text-align:center;}

.cards{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#111;
    padding:15px;
}

#floraGrid{
    display:flex;
    gap:20px;
    padding:20px;
}
</style>
</head>

<body>

<!-- DOMOV -->
<div class="main">
    <div>
        <div id="clock"></div>
        <div id="date-sk"></div>
    </div>

    <div>
        <img id="icon" src="icons/sun.png" class="weather-icon">
        <div id="temp"></div>
        <div id="desc"></div>
    </div>
</div>

<div class="event" id="event">Načítavam...</div>

<!-- FLÓRA -->
<section id="flora" style="display:none;">
    <div style="padding:20px;">
        <button onclick="addPlant()">+ Pridať rastlinu</button>
    </div>
    <div id="floraGrid"></div>
</section>

<!-- MENU -->
<div class="cards">
    <div onclick="showHome()">🏠</div>
    <div onclick="showFlora()">🌿</div>
</div>

<script>

/* ⏰ HODINY */
function updateClock(){
    let now = new Date();
    document.getElementById("clock").innerHTML =
        now.getHours().toString().padStart(2,'0') + ":" +
        now.getMinutes().toString().padStart(2,'0');

    document.getElementById("date-sk").innerHTML =
        now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(updateClock,1000);
updateClock();

/* 🌙 DEN/NOC */
function isNight(){
    let h = new Date().getHours();
    return (h >= 20 || h < 6);
}

/* 🌦️ IKONY */
const weatherMap = {
  clear:{day:"sun.png",night:"clear-night.png"},
  cloudy:{day:"cloud.png",night:"cloudy-night.png"},
  rain:{day:"rain.png",night:"rain-night.png"},
  snow:{day:"snow.png",night:"snow.png"}
};

function setWeather(type){
  let icon = document.getElementById("icon");
  let data = weatherMap[type];
  if(!data) return;
  icon.src = "icons/" + (isNight()?data.night:data.day);
}

/* 🌦️ POČASIE – OPRAVENÉ */
function loadWeather(){
    fetch("https://api.open-meteo.com/v1/forecast?latitude=48.15&longitude=17.11&current=temperature_2m,weather_code")
    .then(res => res.json())
    .then(data => {

        document.getElementById("temp").innerHTML =
            Math.round(data.current.temperature_2m) + "°";

        let code = data.current.weather_code;

        if(code === 0) setWeather("clear");
        else if(code <= 3) setWeather("cloudy");
        else if(code <= 67) setWeather("rain");
        else if(code <= 77) setWeather("snow");

    })
    .catch(()=>{
        document.getElementById("desc").innerHTML="Chyba počasia";
    });
}
loadWeather();

/* 📋 SHEETS – FUNKČNÉ */
const sheetId = '1wAMdy1V_88RKowxIeDsC8Q2ROgS8U44p2NeTfJBKyO8';
const gid = '602623609';

function loadEvents(){
    fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${gid}`)
    .then(res => res.text())
    .then(txt => {

        let json = JSON.parse(txt.substring(47).slice(0,-2));

        let now = new Date();
        let html = "";
        let found = 0;

        json.table.rows.forEach(r=>{
            if(!r.c) return;

            let val = r.c[1]?.f || r.c[1]?.v || "";

            let isToday =
                val.includes(`Date(${now.getFullYear()},${now.getMonth()},${now.getDate()}`) ||
                val.includes(`${now.getDate()}.${now.getMonth()+1}.${now.getFullYear()}`);

            if(!isToday) return;

            let auto = r.c[2]?.v || "";
            let note = r.c[3]?.v || "";

            html += `✨ ${note}<br>(${auto})`;
            found++;
        });

        document.getElementById("event").innerHTML =
            found ? html : "✨ Žiadne udalosti dnes";

    })
    .catch(()=>{
        document.getElementById("event").innerHTML="❌ Chyba načítania";
    });
}
loadEvents();

/* 🔁 NAVIGÁCIA */
function showFlora(){
  document.querySelector(".main").style.display="none";
  document.getElementById("event").style.display="none";
  document.getElementById("flora").style.display="block";
}

function showHome(){
  document.querySelector(".main").style.display="flex";
  document.getElementById("event").style.display="block";
  document.getElementById("flora").style.display="none";
}

/* 🌿 BUTTON */
function addPlant(){
  let name = prompt("Názov rastliny?");
  if(!name) return;

  let plants = JSON.parse(localStorage.getItem("plants")) || [];

  plants.push({
    name: name
  });

  localStorage.setItem("plants", JSON.stringify(plants));

  renderPlants();
}

</script>

</body>
</html>
